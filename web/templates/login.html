<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #16213e;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
        }
        h1 { text-align: center; margin-bottom: 1.5rem; font-size: 1.4rem; }
        input[type="password"] {
            width: 100%;
            padding: .7rem;
            border: 1px solid #334;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: .7rem;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #c73550; }
        .error { color: #e94560; text-align: center; margin-bottom: 1rem; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔒 Dashboard Login</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Contraseña" required autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
